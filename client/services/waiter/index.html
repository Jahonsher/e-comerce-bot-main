<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ServiX — Ofitsiant</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #242833;
    --accent: #f59e0b;
    --accent2: #d97706;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: #2d3348;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  
  /* === LOGIN === */
  .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .login-box { background:var(--bg2); border-radius:var(--radius); padding:40px 30px; width:100%; max-width:380px; text-align:center; border:1px solid var(--border); }
  .login-box h1 { font-size:28px; margin-bottom:6px; }
  .login-box h1 span { color:var(--accent); }
  .login-box p { color:var(--text2); margin-bottom:28px; font-size:14px; }
  .login-box input { width:100%; padding:14px 16px; border:1px solid var(--border); border-radius:10px; background:var(--bg3); color:var(--text); font-size:15px; margin-bottom:12px; outline:none; transition:border .2s; }
  .login-box input:focus { border-color:var(--accent); }
  .login-box button { width:100%; padding:14px; background:var(--accent); color:#000; font-size:16px; font-weight:700; border:none; border-radius:10px; cursor:pointer; transition:background .2s; }
  .login-box button:hover { background:var(--accent2); }
  .login-err { color:var(--red); font-size:13px; margin-top:8px; display:none; }

  /* === MAIN LAYOUT === */
  .app { display:none; }
  .topbar { background:var(--bg2); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar h2 { font-size:18px; font-weight:700; }
  .topbar h2 span { color:var(--accent); }
  .topbar-right { display:flex; align-items:center; gap:8px; }
  .topbar-name { font-size:13px; color:var(--text2); }
  .btn-icon { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; padding:6px; border-radius:8px; transition:all .2s; }
  .btn-icon:hover { background:var(--bg3); color:var(--text); }
  
  /* === TAB NAV === */
  .tabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:53px; z-index:99; }
  .tab { flex:1; text-align:center; padding:12px 8px; font-size:13px; font-weight:600; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  /* === CONTENT === */
  .content { padding:12px; max-width:600px; margin:0 auto; }
  .section { display:none; }
  .section.active { display:block; }

  /* === CARDS === */
  .shot-card { background:var(--bg2); border-radius:var(--radius); padding:16px; margin-bottom:10px; border:1px solid var(--border); transition:all .2s; }
  .shot-card:active { transform:scale(0.98); }
  .shot-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .shot-table { font-size:20px; font-weight:800; }
  .shot-status { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:.5px; }
  .shot-status.open { background:rgba(34,197,94,.15); color:var(--green); }
  .shot-status.closed { background:rgba(100,116,139,.15); color:var(--text3); }
  .shot-meta { display:flex; gap:16px; color:var(--text2); font-size:13px; margin-bottom:12px; }
  .shot-meta span { display:flex; align-items:center; gap:4px; }
  .shot-total { font-size:18px; font-weight:700; color:var(--accent); margin-bottom:12px; }
  .shot-actions { display:flex; gap:8px; flex-wrap:wrap; }
  
  .btn { padding:10px 16px; border-radius:10px; font-size:13px; font-weight:600; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all .2s; }
  .btn:active { transform:scale(0.96); }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-green { background:rgba(34,197,94,.15); color:var(--green); }
  .btn-green:hover { background:rgba(34,197,94,.25); }
  .btn-blue { background:rgba(59,130,246,.15); color:var(--blue); }
  .btn-blue:hover { background:rgba(59,130,246,.25); }
  .btn-red { background:rgba(239,68,68,.15); color:var(--red); }
  .btn-red:hover { background:rgba(239,68,68,.25); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-outline:hover { border-color:var(--text3); color:var(--text); }
  .btn-sm { padding:8px 12px; font-size:12px; }
  .btn-block { width:100%; justify-content:center; }

  /* === SHOT DETAIL === */
  .detail-back { display:flex; align-items:center; gap:8px; color:var(--text2); font-size:14px; cursor:pointer; margin-bottom:16px; padding:6px 0; }
  .detail-back:hover { color:var(--text); }
  .detail-header { background:var(--bg2); border-radius:var(--radius); padding:20px; margin-bottom:12px; border:1px solid var(--border); }
  .detail-title { font-size:24px; font-weight:800; margin-bottom:4px; }
  .detail-sub { color:var(--text2); font-size:14px; }
  
  .item-list { background:var(--bg2); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; margin-bottom:12px; }
  .item-row { padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .item-row:last-child { border-bottom:none; }
  .item-info { flex:1; }
  .item-name { font-weight:600; font-size:14px; margin-bottom:2px; }
  .item-badge { font-size:11px; color:var(--text3); }
  .item-badge.customer { color:var(--blue); }
  .item-badge.waiter { color:var(--orange); }
  .item-price { font-weight:700; font-size:14px; margin-right:12px; white-space:nowrap; }
  .item-kitchen-status { font-size:18px; }
  .ks-pending { color:var(--text3); }
  .ks-cooking { color:var(--orange); }
  .ks-ready { color:var(--green); }

  .detail-total { background:var(--bg2); border-radius:var(--radius); padding:16px 20px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border); margin-bottom:12px; }
  .detail-total-label { font-size:16px; font-weight:600; color:var(--text2); }
  .detail-total-val { font-size:22px; font-weight:800; color:var(--accent); }
  .detail-actions { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }

  /* === MODAL === */
  .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.7); z-index:200; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--bg2); border-radius:var(--radius) var(--radius) 0 0; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; padding:20px; animation:slideUp .25s ease; }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 16px; }
  .modal h3 { font-size:18px; margin-bottom:16px; }
  .modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text3); font-size:24px; cursor:pointer; }

  /* === PRODUCT GRID === */
  .cat-tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:12px; }
  .cat-tabs::-webkit-scrollbar { display:none; }
  .cat-tab { white-space:nowrap; padding:8px 14px; background:var(--bg3); border-radius:20px; font-size:13px; color:var(--text2); cursor:pointer; border:none; transition:all .2s; }
  .cat-tab.active { background:var(--accent); color:#000; font-weight:600; }
  .product-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
  .prod-card { background:var(--bg3); border-radius:10px; padding:12px; cursor:pointer; border:2px solid transparent; transition:all .2s; }
  .prod-card.selected { border-color:var(--accent); background:rgba(245,158,11,.08); }
  .prod-card-name { font-size:13px; font-weight:600; margin-bottom:4px; }
  .prod-card-price { font-size:14px; font-weight:700; color:var(--accent); }
  .prod-qty { display:flex; align-items:center; gap:8px; margin-top:8px; }
  .prod-qty button { width:28px; height:28px; border-radius:8px; border:1px solid var(--border); background:var(--bg2); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .prod-qty span { font-size:14px; font-weight:700; min-width:20px; text-align:center; }

  /* === STATS === */
  .stat-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .stat-card { background:var(--bg2); border-radius:var(--radius); padding:16px; border:1px solid var(--border); }
  .stat-card-val { font-size:22px; font-weight:800; margin-bottom:2px; }
  .stat-card-label { font-size:12px; color:var(--text2); }
  .stat-card.gold .stat-card-val { color:var(--accent); }
  .stat-card.green .stat-card-val { color:var(--green); }
  .stat-card.blue .stat-card-val { color:var(--blue); }
  
  .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:12px; }
  .cal-header { text-align:center; font-size:11px; color:var(--text3); font-weight:600; padding:4px; }
  .cal-day { text-align:center; padding:8px 4px; border-radius:8px; font-size:12px; cursor:default; background:var(--bg3); }
  .cal-day.empty { background:transparent; }
  .cal-day.has-data { background:rgba(245,158,11,.1); color:var(--accent); font-weight:700; }
  .cal-day-num { display:block; }
  .cal-day-info { display:block; font-size:9px; color:var(--text3); margin-top:2px; }

  .month-nav { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:16px; }
  .month-nav button { background:var(--bg3); border:none; color:var(--text); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:16px; }
  .month-nav span { font-size:16px; font-weight:700; min-width:120px; text-align:center; }

  /* === OPEN SHOT MODAL === */
  .table-input { display:flex; gap:8px; margin-bottom:16px; }
  .table-input input { flex:1; padding:14px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:16px; outline:none; }
  .table-input input:focus { border-color:var(--accent); }

  /* === NOTIFICATIONS === */
  .toast { position:fixed; top:70px; right:16px; background:var(--bg2); border:1px solid var(--accent); border-radius:12px; padding:14px 18px; z-index:300; max-width:320px; animation:toastIn .3s ease; box-shadow:var(--shadow); }
  @keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  .toast-title { font-weight:700; font-size:14px; margin-bottom:2px; }
  .toast-msg { font-size:13px; color:var(--text2); }

  .empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
  .empty-state .emoji { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:15px; }

  /* === CONNECTION STATUS === */
  .conn-status { display:flex; align-items:center; gap:4px; font-size:11px; }
  .conn-dot { width:8px; height:8px; border-radius:50%; }
  .conn-dot.on { background:var(--green); }
  .conn-dot.off { background:var(--red); }

  /* === FAB === */
  .fab { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:var(--accent); border:none; color:#000; font-size:28px; cursor:pointer; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; z-index:50; transition:all .2s; }
  .fab:active { transform:scale(0.9); }

  /* === LOADING === */
  .loading { text-align:center; padding:40px; color:var(--text3); }
  .spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <h1>Servi<span>X</span></h1>
    <p>Ofitsiant paneli</p>
    <input type="text" id="loginUser" placeholder="Login" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Parol" autocomplete="current-password">
    <button onclick="doLogin()" id="loginBtn">Kirish</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <h2>Servi<span>X</span></h2>
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">...</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="topbar-name" id="waiterName"></span>
      <button class="btn-icon" onclick="doLogout()" title="Chiqish">⏻</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="shots" onclick="switchTab('shots')">🪑 Shotlar</div>
    <div class="tab" data-tab="stats" onclick="switchTab('stats')">📊 Hisobot</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <!-- SHOTS SECTION -->
    <div class="section active" id="sec-shots">
      <div id="shotsList"></div>
    </div>

    <!-- SHOT DETAIL (hidden by default) -->
    <div class="section" id="sec-detail">
      <div class="detail-back" onclick="backToShots()">← Ortga</div>
      <div id="shotDetail"></div>
    </div>

    <!-- STATS SECTION -->
    <div class="section" id="sec-stats">
      <div id="statsContent"></div>
    </div>
  </div>

  <!-- FAB: Yangi shot -->
  <button class="fab" id="fabBtn" onclick="showOpenShotModal()">+</button>
</div>

<!-- MODAL: Yangi shot ochish -->
<div class="modal-overlay" id="openShotModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>🪑 Yangi stol ochish</h3>
    <div class="table-input">
      <input type="text" id="newTableNum" placeholder="Stol raqami (masalan: 5)" autofocus>
    </div>
    <button class="btn btn-primary btn-block" onclick="openNewShot()">Ochish</button>
    <div style="height:8px;"></div>
    <button class="btn btn-outline btn-block" onclick="closeModal('openShotModal')">Bekor qilish</button>
  </div>
</div>

<!-- MODAL: Mahsulot qo'shish -->
<div class="modal-overlay" id="addItemModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>📦 Mahsulot qo'shish</h3>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="product-grid" id="prodGrid"></div>
    <button class="btn btn-primary btn-block" onclick="confirmAddItems()">✓ Qo'shish</button>
    <div style="height:8px;"></div>
    <button class="btn btn-outline btn-block" onclick="closeModal('addItemModal')">Bekor qilish</button>
  </div>
</div>

<!-- MODAL: Shot yopish tasdiqlash -->
<div class="modal-overlay" id="closeShotModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>💳 Shotni yopish</h3>
    <p style="color:var(--text2);margin-bottom:8px;">Jami summa:</p>
    <div style="font-size:28px;font-weight:800;color:var(--accent);margin-bottom:20px;" id="closeShotTotal"></div>
    <button class="btn btn-green btn-block" onclick="confirmCloseShot()" id="closeShotBtn">✓ Shot yopish</button>
    <div style="height:8px;"></div>
    <button class="btn btn-outline btn-block" onclick="closeModal('closeShotModal')">Bekor qilish</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
