<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ishchi Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:     '#0f172a',
            bg2:    '#1e293b',
            bg3:    '#334155',
            card:   '#1e293b',
            accent: '#3b82f6',
            gold:   '#f59e0b',
            green:  '#22c55e',
            red:    '#ef4444',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background:#0f172a; font-family:'Inter',sans-serif; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    /* Login */
    #loginPage {
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      padding:20px;
    }
    .login-card {
      width:100%; max-width:380px;
      background:#1e293b;
      border:1px solid rgba(59,130,246,0.2);
      border-radius:16px;
      padding:32px;
      box-shadow:0 24px 48px rgba(0,0,0,0.4);
    }
    .inp {
      width:100%; padding:11px 14px;
      background:#0f172a;
      border:1px solid rgba(99,179,237,0.15);
      border-radius:8px;
      color:#f1f5f9;
      font-size:14px;
      outline:none;
      transition:border-color .2s;
      font-family:'Inter',sans-serif;
    }
    .inp:focus { border-color:#3b82f6; }
    .inp::placeholder { color:#475569; }
    .btn-primary {
      width:100%; padding:12px;
      background:linear-gradient(135deg,#3b82f6,#1d4ed8);
      color:#fff;
      font-weight:600; font-size:14px;
      border:none; border-radius:8px;
      cursor:pointer; transition:opacity .2s;
      font-family:'Inter',sans-serif;
    }
    .btn-primary:hover { opacity:.9; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }

    /* App */
    #appPage { display:none; min-height:100vh; }

    /* Header */
    .app-header {
      background:#1e293b;
      border-bottom:1px solid rgba(99,179,237,0.12);
      padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:10;
    }

    /* Status card */
    .status-card {
      border-radius:16px;
      padding:24px;
      border:1px solid;
      text-align:center;
      transition:all .3s;
    }
    .status-notchecked { background:rgba(99,179,237,0.05); border-color:rgba(99,179,237,0.15); }
    .status-working    { background:rgba(34,197,94,0.08);  border-color:rgba(34,197,94,0.25); }
    .status-done       { background:rgba(148,163,184,0.05); border-color:rgba(148,163,184,0.15); }

    /* Checkin button */
    .checkin-btn {
      width:160px; height:160px;
      border-radius:50%;
      border:3px solid #3b82f6;
      background:rgba(59,130,246,0.1);
      color:#3b82f6;
      font-size:15px; font-weight:700;
      cursor:pointer;
      transition:all .2s;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:8px; margin:0 auto;
      font-family:'Inter',sans-serif;
    }
    .checkin-btn:hover { background:rgba(59,130,246,0.2); transform:scale(1.03); }
    .checkin-btn.working {
      border-color:#22c55e;
      background:rgba(34,197,94,0.1);
      color:#22c55e;
    }
    .checkin-btn.done {
      border-color:#475569;
      background:rgba(71,85,105,0.1);
      color:#475569;
      cursor:default;
    }

    /* Camera */
    #cameraWrap {
      display:none;
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.95);
      flex-direction:column;
      align-items:center; justify-content:center;
      padding:20px;
    }
    #cameraWrap.open { display:flex; }
    #videoEl {
      width:100%; max-width:400px;
      border-radius:16px;
      border:2px solid #3b82f6;
      background:#000;
    }
    #canvasEl { display:none; }

    /* Stats tab */
    .stat-box {
      background:#1e293b;
      border:1px solid rgba(99,179,237,0.12);
      border-radius:12px;
      padding:16px;
      text-align:center;
    }

    /* Record row */
    .record-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0;
      border-bottom:1px solid rgba(99,179,237,0.08);
    }
    .record-row:last-child { border-bottom:none; }

    /* Bottom nav */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:#1e293b;
      border-top:1px solid rgba(99,179,237,0.12);
      display:flex;
      z-index:10;
    }
    .nav-item {
      flex:1; padding:12px 0;
      display:flex; flex-direction:column;
      align-items:center; gap:4px;
      cursor:pointer;
      color:#475569;
      font-size:10px; font-weight:500;
      letter-spacing:.5px;
      transition:color .2s;
      border:none; background:transparent;
      font-family:'Inter',sans-serif;
    }
    .nav-item.active { color:#3b82f6; }
    .nav-item span { font-size:20px; }

    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .pulse { animation:pulse 2s infinite; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation:fadeUp .35s ease both; }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginPage" style="display:flex">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:40px;margin-bottom:8px">👤</div>
      <div style="font-size:20px;font-weight:700;color:#f1f5f9">Ishchi Paneli</div>
      <div style="font-size:13px;color:#475569;margin-top:4px">Login qiling</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="font-size:11px;font-weight:600;color:#64748b;letter-spacing:1px;display:block;margin-bottom:5px">LOGIN</label>
        <input class="inp" id="loginUser" type="text" placeholder="Username">
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:#64748b;letter-spacing:1px;display:block;margin-bottom:5px">PAROL</label>
        <input class="inp" id="loginPass" type="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div id="loginErr" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:10px 12px;border-radius:8px;font-size:13px;text-align:center"></div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">Kirish</button>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="appPage" style="display:none">
  <!-- Header -->
  <div class="app-header">
    <div>
      <div style="font-size:15px;font-weight:700;color:#f1f5f9" id="headerName">—</div>
      <div style="font-size:11px;color:#475569" id="headerPosition">—</div>
    </div>
    <button onclick="doLogout()" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif">Chiqish</button>
  </div>

  <!-- Pages -->
  <div id="mainContent" style="padding:20px 16px 80px"></div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="showPage('home',this)">
      <span>🏠</span>BOSH
    </button>
    <button class="nav-item" data-page="stats" onclick="showPage('stats',this)">
      <span>📊</span>STATISTIKA
    </button>
    <button class="nav-item" data-page="history" onclick="showPage('history',this)">
      <span>📅</span>TARIX
    </button>
  </div>
</div>

<!-- ===== CAMERA MODAL ===== -->
<div id="cameraWrap">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:16px;color:#f1f5f9;font-size:16px;font-weight:600">
      📸 Selfie oling
    </div>
    <video id="videoEl" autoplay playsinline></video>
    <canvas id="canvasEl"></canvas>
    <div style="display:flex;gap:12px;margin-top:16px">
      <button onclick="closeCam()" style="flex:1;padding:12px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:10px;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif">Bekor</button>
      <button onclick="takePhoto()" style="flex:1;padding:12px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;color:#fff;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">📸 Olish</button>
    </div>
  </div>
</div>

<!-- face-api.js models CDN dan yuklanadi -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="app.js"></script>
</body>
</html>
