<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ServiX — Super Admin</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2306b6d4'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M8 14l5 5 11-11' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M8 20l5 5 11-11' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none' opacity='.5'/%3E%3C/svg%3E"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { sans: ['Manrope','sans-serif'], serif: ['Playfair Display','serif'] } } }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root { --sx-cyan:#06b6d4; --sx-purple:#8b5cf6; --sx-grad:linear-gradient(135deg,#06b6d4,#8b5cf6); }
  body { background:#070b14; color:#f1f5f9; font-family:'Manrope',sans-serif; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-thumb { background:var(--sx-cyan); border-radius:2px; }
  .si { display:flex; align-items:center; gap:10px; padding:10px 20px; cursor:pointer; border-left:3px solid transparent; font-size:13px; font-weight:500; color:#64748b; transition:all .2s; }
  .si:hover { background:rgba(6,182,212,0.07); color:#f1f5f9; }
  .si.active { background:rgba(6,182,212,0.12); border-left-color:var(--sx-cyan); color:#22d3ee; }
  .inp { width:100%; padding:11px 14px; background:#141d2e; border:1px solid rgba(6,182,212,0.15); border-radius:8px; color:#f1f5f9; font-family:'Manrope',sans-serif; font-size:14px; outline:none; transition:border .2s; }
  .inp:focus { border-color:var(--sx-cyan); }
  .tab-btn { padding:8px 18px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; border:1px solid rgba(6,182,212,0.2); color:#64748b; background:transparent; white-space:nowrap; }
  .tab-btn.active { background:rgba(6,182,212,0.2); color:#22d3ee; border-color:var(--sx-cyan); }
  .tab-btn:hover:not(.active) { background:rgba(6,182,212,0.07); color:#f1f5f9; }
  .pb { padding:5px 14px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; border:1px solid rgba(6,182,212,0.15); color:#64748b; background:transparent; }
  .pb.active { background:var(--sx-grad); color:#fff; border-color:transparent; }
  .pb:hover:not(.active) { color:#f1f5f9; }
  .rank-row { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:12px; border:1px solid rgba(6,182,212,0.1); background:#0f1828; margin-bottom:8px; transition:all .2s; }
  .rank-row:hover { border-color:rgba(6,182,212,0.3); transform:translateY(-1px); }
  .m1 { background:linear-gradient(135deg,#f59e0b,#d97706); }
  .m2 { background:linear-gradient(135deg,#94a3b8,#64748b); }
  .m3 { background:linear-gradient(135deg,#cd7f32,#a0522d); }
  .mo { background:#1a2235; }
  .smc { background:#0f1828; border:1px solid rgba(6,182,212,0.1); border-radius:10px; padding:14px 16px; }
  .sx-logo { display:inline-flex; align-items:center; gap:10px; }
  .sx-icon { width:36px; height:36px; border-radius:10px; background:var(--sx-grad); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sx-icon svg { width:20px; height:20px; }
  .sx-name { font-size:18px; font-weight:800; color:#f1f5f9; letter-spacing:-0.5px; }
  .sx-name b { background:var(--sx-grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .page { animation:fadeIn .22s ease; }
  @media(max-width:768px) { .sidebar{transform:translateX(-100%)} .sidebar.open{transform:translateX(0)} .mw{margin-left:0!important} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="fixed inset-0 flex items-center justify-center z-50" style="background:#070b14">
  <div class="w-full max-w-sm mx-4 rounded-2xl p-10 border" style="background:#0d1220;border-color:rgba(6,182,212,0.2)">
    <div class="flex justify-center mb-4">
      <div class="sx-icon" style="width:56px;height:56px;border-radius:14px">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px"><path d="M5 10l4 4 10-10"/><path d="M5 16l4 4 10-10" opacity=".5"/></svg>
      </div>
    </div>
    <div class="text-center mb-1 sx-name" style="font-size:24px">Servi<b>X</b></div>
    <div class="text-center text-xs mb-8 tracking-widest uppercase" style="color:#64748b">Super Admin Panel</div>
    <div class="mb-4">
      <label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Login</label>
      <input id="loginUser" type="text" class="inp" placeholder="username" autocomplete="username"/>
    </div>
    <div class="mb-2">
      <label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Parol</label>
      <input id="loginPass" type="password" class="inp" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button id="loginBtn" class="w-full mt-5 py-3 rounded-xl font-bold text-sm text-white transition-opacity hover:opacity-90" style="background:var(--sx-grad)">Kirish</button>
    <div id="loginErr" class="text-center text-sm mt-3 rounded-lg px-3 py-2" style="color:#ef4444;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);display:none"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden min-h-screen">
  <button id="hamburger" class="fixed top-4 left-4 z-40 md:hidden flex items-center justify-center w-10 h-10 rounded-xl border text-lg" style="background:#0d1220;border-color:rgba(6,182,212,0.2)">☰</button>
  <div id="sidebarOverlay" class="hidden fixed inset-0 z-30 md:hidden" style="background:rgba(0,0,0,0.6)"></div>
  <aside id="sidebar" class="sidebar fixed left-0 top-0 bottom-0 w-56 z-40 flex flex-col transition-transform duration-300 border-r" style="background:#0d1220;border-color:rgba(6,182,212,0.12)">
    <div class="px-5 py-6 border-b" style="border-color:rgba(6,182,212,0.12)">
      <div class="sx-logo mb-2">
        <div class="sx-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 10l4 4 10-10"/><path d="M5 16l4 4 10-10" opacity=".5"/></svg></div>
        <div class="sx-name">Servi<b>X</b></div>
      </div>
      <div class="text-xs font-bold tracking-widest uppercase px-2 py-0.5 rounded inline-block mb-1" style="background:var(--sx-grad);color:#fff">SUPER ADMIN</div>
      <div id="saUsername" class="text-xs mt-1" style="color:#64748b"></div>
    </div>
    <nav class="py-3 flex-1">
      <div class="si active" data-page="dashboard"><span>📊</span> Dashboard</div>
      <div class="si" data-page="restaurants"><span>🏪</span> Restoranlar</div>
    </nav>
    <div class="p-4 border-t" style="border-color:rgba(6,182,212,0.12)">
      <button id="logoutBtn" class="w-full py-2 rounded-lg text-xs font-semibold border transition-all" style="background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2);color:#ef4444">Chiqish</button>
    </div>
  </aside>
  <main id="mainContent" class="mw ml-56 p-7 min-h-screen"></main>
</div>

<!-- RESTAURANT MODAL -->
<div id="restModal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background:rgba(0,0,0,0.8)">
  <div class="w-full max-w-lg mx-4 rounded-2xl p-7 border overflow-y-auto" style="background:#0d1220;border-color:rgba(6,182,212,0.2);max-height:90vh">
    <h2 id="restModalTitle" class="text-xl font-bold mb-5" style="color:#22d3ee">Yangi restoran</h2>
    <input type="hidden" id="restEditId"/>
    <div class="grid grid-cols-2 gap-3">
      <div class="col-span-2"><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Restoran nomi *</label><input class="inp" type="text" id="rName" placeholder="Samarqand Oshi"/></div>
      <div><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Restoran ID *</label><input class="inp" type="text" id="rId" placeholder="samarqand"/></div>
      <div><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Admin login *</label><input class="inp" type="text" id="rUsername" placeholder="samarqand_admin"/></div>
      <div><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Parol *</label><input class="inp" type="password" id="rPassword" placeholder="••••••••"/></div>
      <div><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Telefon</label><input class="inp" type="text" id="rPhone" placeholder="+998 90 000 00 00"/></div>
      <div class="col-span-2"><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Manzil</label><input class="inp" type="text" id="rAddress" placeholder="Toshkent, Chilonzor..."/></div>
      <div class="col-span-2"><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Bot Token</label><input class="inp" type="text" id="rBotToken" placeholder="1234567890:AAF..."/></div>
      <div><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Chef Telegram ID</label><input class="inp" type="text" id="rChefId" placeholder="123456789"/></div>
      <div><label class="block text-xs uppercase tracking-widest mb-2" style="color:#64748b">Webapp URL</label><input class="inp" type="text" id="rWebapp" placeholder="https://..."/></div>
    </div>
    <div class="flex gap-3 mt-6">
      <button id="restModalCancel" class="px-5 py-2.5 rounded-xl text-sm border transition-colors" style="border-color:rgba(6,182,212,0.2);color:#64748b">Bekor</button>
      <button id="restModalSave" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white" style="background:var(--sx-grad)">Saqlash</button>
    </div>
  </div>
</div>

<script src="superadmin.js"></script>
</body>
</html>
